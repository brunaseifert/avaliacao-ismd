<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="author" content="Front-end desenvolvido por Bruna Seifert © 2025" />
  <title>Avaliação de Atendimento - ISMD</title>
  <style>
    body {
      font-family: made-tommy Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      background-color: #114739;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .logo-bg {
      background-image: url('img/Logo horizontal branco.png'); 
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      width: 300px;
      height: 80px;
      margin-bottom: 20px;
    }

    .card {
      background-color: #ffffff;
      width: 90vw; 
      max-width: 600px;
      border-radius: 12px;
      padding: 30px;
    }

    h2 {
      color: #114739;
      font-size: 24px;
      margin-bottom: 15px;
      text-align: center;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-size: 16px;
    }

    .id_Paciente {
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    .carinhas {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: flex-start;
      margin-top: 10px;
      margin-bottom: 15px;
    }

    .carinhas input[type="radio"] {
      display: none;
    }

    .carinhas label {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icone-carinha {
      width: 60px;  
      height: 60px;
      transition: transform 0.2s ease;
      pointer-events: none;
    }

    input[type="radio"]:checked + label .icone-carinha {
      transform: scale(1.2);
    }

    .carinhas label:hover .icone-carinha {
      transform: scale(1.1);
    }

    textarea {
      width: 100%;
      resize: none;
      height: 100px;
      border-radius: 6px;
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
      font-family: Arial, sans-serif;
    }

    .anonimato-container {
      margin-top: 10px;
      font-weight: normal;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .anonimato-container input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      margin: 0;
    }

    .buttons {
      display: flex;
      justify-content: flex-end; 
      margin-top: 20px;
    }

    button {
      padding: 12px 24px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .submit-btn {
      background-color: #114739;
      color: white;
    } 

    .riscado {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

<div class="logo-bg"></div>

<div class="card">
  <h2>Avaliação de Atendimento - ISMD</h2>

  <div class="id_Paciente">
    <p><strong>ID do Paciente:</strong> <span id="paciente_id_span" class="paciente-id"></span></p>
    <p><strong>Atendente:</strong> <span id="atendente_nome_span"></span></p>
  </div>

  <form id="avaliacaoForm">
    <div class="criterion">
      <label class="criterion-title">Como foi seu atendimento?<span style="color: red;"> *</span></label>
      <div class="carinhas">
        <input type="radio" name="atendimento" id="atendimento_ruim" value="ruim" />
        <label for="atendimento_ruim" title="Ruim">
          <img src="img/bravo.png" alt="Ruim" class="icone-carinha" />
        </label>

        <input type="radio" name="atendimento" id="atendimento_neutro" value="neutro" />
        <label for="atendimento_neutro" title="Neutro">
          <img src="img/neutro.png" alt="Neutro" class="icone-carinha" />
        </label>

        <input type="radio" name="atendimento" id="atendimento_bom" value="bom" />
        <label for="atendimento_bom" title="Bom">
          <img src="img/bom.png" alt="Bom" class="icone-carinha" />
        </label>

        <input type="radio" name="atendimento" id="atendimento_otimo" value="otimo" />
        <label for="atendimento_otimo" title="Otimo">
          <img src="img/feliz.png" alt="Otimo" class="icone-carinha" />
        </label>
      </div>
    </div>

    <label for="comentarios">Deixe seu comentário (Opcional)</label>
    <textarea id="comentarios" maxlength="100" placeholder="Escreva aqui seu comentário..."></textarea>

    <div class="anonimato-container">
      <input type="checkbox" id="anonimo" name="anonimo" />
      <label for="anonimo">Avaliar anonimamente</label>
    </div>

    <div class="buttons">
      <button type="submit" class="submit-btn">Enviar</button>
    </div>
  </form>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pacienteId = params.get("paciente_id") || "Não informado";
  const atendenteNome = params.get("atendente_nome") || "Não informado";

  // Preencher dados
  const pacienteIdSpan = document.getElementById("paciente_id_span");
  const atendenteNomeSpan = document.getElementById("atendente_nome_span");
  const anonimatoCheckbox = document.getElementById("anonimo");

  pacienteIdSpan.innerText = pacienteId;
  atendenteNomeSpan.innerText = atendenteNome;

  // Lógica para riscar o ID se for anônimo
  anonimatoCheckbox.addEventListener("change", function () {
    if (this.checked) {
      pacienteIdSpan.classList.add("riscado");
    } else {
      pacienteIdSpan.classList.remove("riscado");
    }
  });

  // Validação do formulário
  document.getElementById("avaliacaoForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const atendimentoSelecionado = document.querySelector('input[name="atendimento"]:checked');

    if (!atendimentoSelecionado) {
      alert("Por favor, selecione uma opção em 'Como foi seu atendimento?'.");
      return;
    }

    window.location.href = "feedback.html";
  });
</script>

</body>
</html>
